name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows VST3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-windows-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RC-20-Clone-Windows-VST3
          path: "build/RC20Clone_artefacts/Release/VST3"

  build-macos:
    name: macOS VST3 + AU
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache JUCE FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-macos-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Xcode

      - name: Build
        run: cmake --build build --config Release

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: RC-20-Clone-macOS-VST3
          path: "build/RC20Clone_artefacts/Release/VST3"

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: RC-20-Clone-macOS-AU
          path: "build/RC20Clone_artefacts/Release/AU"

  validate:
    name: pluginval (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype-dev libx11-dev libxrandr-dev \
            libxcursor-dev libxinerama-dev \
            ninja-build

      - name: Cache JUCE FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-linux-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ \
            -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Download pluginval
        run: |
          curl -LOs https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
          unzip pluginval_Linux.zip
          chmod +x pluginval

      - name: Run pluginval
        run: |
          ./pluginval \
            --validate "build/RC20Clone_artefacts/Release/VST3/RC-20 Clone.vst3" \
            --strictness-level 5 \
            --disabled-tests scripts/pluginval-disabled-tests.txt

  release:
    name: Attach to GitHub Release
    needs: [build-windows, build-macos, validate]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip each artifact
        run: |
          cd artifacts
          zip -r "../RC-20-Clone-Windows-VST3.zip" "RC-20-Clone-Windows-VST3"
          zip -r "../RC-20-Clone-macOS-VST3.zip"   "RC-20-Clone-macOS-VST3"
          zip -r "../RC-20-Clone-macOS-AU.zip"     "RC-20-Clone-macOS-AU"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            RC-20-Clone-Windows-VST3.zip
            RC-20-Clone-macOS-VST3.zip
            RC-20-Clone-macOS-AU.zip
